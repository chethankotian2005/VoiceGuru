name: voiceguru_app
description: "VoiceGuru - AI Tutor for Karnataka State Board Students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.0.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.0.0
  cached_network_image: ^3.0.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.0
  just_audio: ^0.9.40
  http: ^1.0.0
  path_provider: ^2.1.4
  shared_preferences: ^2.0.0
  provider: ^6.1.5+1
  confetti: ^0.7.0
  image_picker: ^1.2.1
  animated_text_kit: ^4.3.0
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.0
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/sounds/
